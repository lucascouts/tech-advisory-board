# Example GitHub Actions workflow — run TAB headlessly against a PR body or
# an issue title, validate the synthesis, and fail CI if the Stop-gate
# rejects it.
#
# Prerequisites:
#   - CLAUDE_CODE_OAUTH_TOKEN secret set in the repo / org.
#   - Claude Code installed in the runner (see claude.com/docs).
#   - MCPs configured via `claude mcp add` step before running TAB (optional;
#     without MCPs, claims are flagged [unverified]).
#
# Usage:
#   Place this file at .github/workflows/tab-review.yml and adjust the
#   prompt source (PR body, issue title, input) to your workflow.

name: TAB Review

on:
  workflow_dispatch:
    inputs:
      question:
        description: "Technical decision question for the advisory board"
        required: true
        type: string
  pull_request:
    types: [opened, labeled]

jobs:
  deliberate:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'needs-tab-review')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install TAB plugin
        run: |
          claude plugin marketplace add lucascouts/tech-advisory-board
          claude plugin install tech-advisory-board@tech-advisory-board

      - name: Configure MCPs (optional but recommended)
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: |
          if [ -n "$PERPLEXITY_API_KEY" ]; then
            claude mcp add perplexity --env PERPLEXITY_API_KEY="$PERPLEXITY_API_KEY" -- npx -y perplexity-mcp-server
          fi
          claude mcp add context7 -- npx -y @upstash/context7-mcp
          if [ -n "$BRAVE_API_KEY" ]; then
            claude mcp add brave-search --env BRAVE_API_KEY="$BRAVE_API_KEY" -- npx -y brave-search-mcp
          fi
          check-mcps || echo "Running in degraded mode"

      - name: Pick question
        id: q
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "question=${{ inputs.question }}" >> "$GITHUB_OUTPUT"
          else
            # Use the PR title as the question; the PR body provides context.
            echo "question=${{ github.event.pull_request.title }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve plugin root
        id: plugin
        run: |
          PLUGIN_ROOT=$(claude plugin path tech-advisory-board)
          echo "root=$PLUGIN_ROOT" >> "$GITHUB_OUTPUT"

      - name: Run TAB (headless, --bare, stream-json)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Extended prompt cache (1h) — default in CI per §3.8.3 / CHANGELOG;
          # Moderator system prompt is reused across every subagent dispatch,
          # cache hit rate >60% compensates for Opus 4.7 pricing. Required
          # for Complete / Complete+; optional but recommended otherwise.
          ENABLE_PROMPT_CACHING_1H: "1"
        run: |
          # --bare             : skip plugin auto-discovery (CC ≥ v2.1.81). We
          #                      install the marketplace plugin explicitly above;
          #                      bare mode prevents the runner's own global
          #                      plugins from interfering with the TAB contract.
          # --include-partial-messages : surface the stream-json init event so we
          #                      can fail fast on `plugin_errors`.
          # --json-schema      : validate the final assistant message against
          #                      the TAB synthesis contract (schemas/synthesis.schema.json).
          #
          # ADR writes use `permissionDecision: "defer"` (not
          # --dangerously-skip-permissions, which is an anti-pattern). The
          # defer hook pauses the headless session at the tool call; an
          # external approval job flips the session back on via --resume
          # once a reviewer sanctions the ADR generation. See
          # `skills/tab/references/automation.md` §7.2 for the full recipe.
          PLUGIN_ROOT="${{ steps.plugin.outputs.root }}"
          DEFER_HOOK=$(jq -n --arg root "$PLUGIN_ROOT" '{
            hooks: {
              PreToolUse: [
                {
                  matcher: "Bash",
                  if: ("Bash(" + $root + "/bin/new-adr *)"),
                  hooks: [{
                    type: "command",
                    command: ("echo " + (
                      "{\"hookSpecificOutput\":{\"hookEventName\":\"PreToolUse\","
                      + "\"permissionDecision\":\"defer\","
                      + "\"permissionDecisionReason\":\"ADR write requires approval\"}}"
                      | @sh))
                  }]
                },
                {
                  matcher: "Bash",
                  if: ("Bash(" + $root + "/bin/supersede-adr *)"),
                  hooks: [{
                    type: "command",
                    command: ("echo " + (
                      "{\"hookSpecificOutput\":{\"hookEventName\":\"PreToolUse\","
                      + "\"permissionDecision\":\"defer\","
                      + "\"permissionDecisionReason\":\"ADR supersede requires approval\"}}"
                      | @sh))
                  }]
                }
              ]
            }
          }')
          claude -p "/tech-advisory-board:tab \"${{ steps.q.outputs.question }}\"" \
            --bare \
            --output-format stream-json \
            --include-partial-messages \
            --json-schema "$PLUGIN_ROOT/schemas/synthesis.schema.json" \
            --settings "$DEFER_HOOK" \
            --allowedTools "WebSearch,WebFetch,Read,Grep,Glob,Agent,TodoWrite" \
            > tab-stream.ndjson
          # Capture session_id for potential --resume after ADR approval.
          SESSION_ID=$(jq -s -r 'map(select(.type=="init")) | .[0].session_id // empty' tab-stream.ndjson)
          echo "session_id=$SESSION_ID" >> "$GITHUB_OUTPUT"
        id: run_tab

      # Optional approval-gated resume: uncomment and wire to a
      # workflow_dispatch input or environment protection rule if your
      # org requires human sign-off before an ADR is written. The deferred
      # tool call is replayed once the host resumes the session.
      # - name: Approve and resume (ADR write)
      #   if: needs.approval.outputs.approved == 'true' && steps.run_tab.outputs.session_id != ''
      #   env:
      #     CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      #   run: claude -p --resume "${{ steps.run_tab.outputs.session_id }}" --bare

      - name: Fail fast if TAB was demoted at plugin init
        run: |
          # Claude Code >= v2.1.111 emits `plugin_errors` in the init event
          # of `--output-format stream-json`. If TAB failed to load, every
          # downstream step is wasted tokens.
          if jq -s -e 'map(select(.type=="init")) | .[0].plugin_errors[] | select(.plugin_name=="tech-advisory-board")' tab-stream.ndjson >/dev/null 2>&1; then
            echo "::error::TAB plugin was demoted at init. See plugin_errors."
            jq -s 'map(select(.type=="init")) | .[0].plugin_errors[] | select(.plugin_name=="tech-advisory-board")' tab-stream.ndjson
            exit 1
          fi

      - name: Locate synthesis
        id: synth
        run: |
          SYNTH=$(find .tab/sessions -name synthesis.json -not -path '*/archived/*' | sort | tail -1)
          echo "path=$SYNTH" >> "$GITHUB_OUTPUT"

      - name: Validate synthesis
        # `--json-schema` above already enforces the schema on the assistant
        # message; this step is a secondary defensive check against the
        # synthesis.json file on disk (caught when the host writes after
        # validation) — useful for schemas drift between the message stream
        # and the final persisted file.
        run: |
          "${{ steps.plugin.outputs.root }}/scripts/validate-synthesis-json.sh" \
            "${{ steps.synth.outputs.path }}"

      - name: Validate claims
        run: |
          SESSION=$(dirname "${{ steps.synth.outputs.path }}")
          "${{ steps.plugin.outputs.root }}/scripts/validate-claims.sh" \
            --session "$SESSION"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tab-session
          path: |
            .tab/sessions/**/synthesis.json
            .tab/sessions/**/report.md
            .tab/sessions/**/state.json
            .tab/sessions/**/telemetry.json
            .tab/decisions/*.md
            .tab/index.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '${{ steps.synth.outputs.path }}'.replace('synthesis.json', 'report.md');
            if (!fs.existsSync(path)) return;
            const body = fs.readFileSync(path, 'utf8');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "## TAB Advisory Board Result\n\n" + body.slice(0, 60000)
            });
